server:
  port: 0
spring:
  application:
    name: department-service
  datasource:
    url: jdbc:postgresql://localhost:5432/departmentdb
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
